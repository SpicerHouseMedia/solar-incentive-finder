<!DOCTYPE html>
<html lang="en">
<head>

<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4">

        <h2 class="text-xl font-bold text-slate-900">Finding Your Incentives...</h2>
        <p class="text-slate-500 mt-2">We're matching your zip code to local programs.</p>
    </div>
    <script>
        const ranges = [
            { s: 'al', min: 35004, max: 36925 }, { s: 'ak', min: 99501, max: 99950 },
            { s: 'az', min: 85001, max: 86556 }, { s: 'ar', min: 71601, max: 72959 },
            { s: 'ca', min: 90001, max: 96167 }, { s: 'co', min: 80001, max: 81658 },
            { s: 'ct', min: '06001', max: '06928' }, { s: 'de', min: '19701', max: '19980' },
            { s: 'fl', min: 32004, max: 34997 }, { s: 'ga', min: 30002, max: 31909 },
            { s: 'hi', min: 96701, max: 96898 }, { s: 'id', min: 83201, max: 83876 },
            { s: 'il', min: 60001, max: 62999 }, { s: 'in', min: 46001, max: 47997 },
            { s: 'ia', min: 50001, max: 52809 }, { s: 'ks', min: 66002, max: 67954 },
            { s: 'ky', min: 40003, max: 42788 }, { s: 'la', min: 70001, max: 71497 },
            { s: 'me', min: '03901', max: '04992' }, { s: 'md', min: 20588, max: 21930 },
            { s: 'ma', min: '01001', max: '02791' }, { s: 'mi', min: 48001, max: 49971 },
            { s: 'mn', min: 55001, max: 56763 }, { s: 'ms', min: 38601, max: 39776 },
            { s: 'mo', min: 63001, max: 65897 }, { s: 'mt', min: 59001, max: 59937 },
            { s: 'ne', min: '68001', max: '69367' }, { s: 'nv', min: 88901, max: 89883 },
            { s: 'nh', min: '03001', max: '03897' }, { s: 'nj', min: '07001', max: '08989' },
            { s: 'nm', min: 87001, max: 88441 }, { s: 'ny', min: '00501', max: '14925' },
            { s: 'nc', min: 27006, max: 28909 }, { s: 'nd', min: 58001, max: 58856 },
            { s: 'oh', min: '43001', max: '45999' }, { s: 'ok', min: 73001, max: 74966 },
            { s: 'or', min: 97001, max: 97920 }, { s: 'pa', min: 15001, max: 19640 },
            { s: 'ri', min: '02801', max: '02940' }, { s: 'sc', min: 29001, max: 29945 },
            { s: 'sd', min: 57001, max: 57793 }, { s: 'tn', min: 37010, max: 38589 },
            { s: 'tx', min: 73301, max: 88595 }, { s: 'ut', min: '84001', max: '84784' },
            { s: 'vt', min: '05001', max: '05907' }, { s: 'va', min: 20001, max: 24658 },
            { s: 'wa', min: 98001, max: 99403 }, { s: 'wv', min: 24701, max: 26886 },
            { s: 'wi', min: 53001, max: 54990 }, { s: 'wy', min: 82001, max: 83128 },
            { s: 'dc', min: 20001, max: 20599 }
        ];
        function findState(zip) {
            for (const range of ranges) {
                if (zip >= range.min && zip <= range.max) return range.s;
            }
            return null;
        }
        const params = new URLSearchParams(window.location.search);
        const zip = params.get('zip');
        const state = findState(parseInt(zip));
        if (state) {
            // PASS THE ZIP ALONG
            window.location.href = '/states/' + state + '/?zip=' + zip;
        } else {
            window.location.href = '/blog/';
        }
    </script>
</body>
